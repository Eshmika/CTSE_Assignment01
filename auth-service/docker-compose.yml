version: "3.8"

services:
  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - JWT_SECRET=your-super-secret-key-change-in-production-env
      - AUTH_SERVICE_URL=http://auth-service:8081
      - CATALOG_SERVICE_URL=http://catalog-service:8082
      - ORDER_SERVICE_URL=http://order-service:8083
      - PAYMENT_SERVICE_URL=http://payment-service:8084
    depends_on:
      - auth-service
      - catalog-service
      - order-service
      - payment-service
    networks:
      - microservices-network
    healthcheck:
      test:
        ["CMD", "wget", "-q", "-O-", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

  auth-service:
    build:
      context: ./auth-service
      dockerfile: Dockerfile
    ports:
      - "8081:8081"
    environment:
      - JWT_SECRET=your-super-secret-key-change-in-production-env
      - SPRING_MONGODB_URI=mongodb+srv://eshmika:eshmika123@ctse-assignment.0krp64m.mongodb.net/?appName=CTSE-assignment
      - SPRING_MONGODB_DATABASE=authdb
    networks:
      - microservices-network
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "-q",
          "-O-",
          "http://localhost:8081/auth/actuator/health/liveness",
        ]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

  catalog-service:
    build:
      context: ./catalog-service
      dockerfile: Dockerfile
    ports:
      - "8082:8082"
    environment:
      - JWT_SECRET=your-super-secret-key-change-in-production-env
      - SERVICE_AUTH_URL=http://auth-service:8081
      - SPRING_MONGODB_URI=mongodb+srv://eshmika:eshmika123@ctse-assignment.0krp64m.mongodb.net/?appName=CTSE-assignment
      - SPRING_MONGODB_DATABASE=catalogdb
    depends_on:
      - auth-service
    networks:
      - microservices-network
    healthcheck:
      test:
        ["CMD", "wget", "-q", "-O-", "http://localhost:8082/actuator/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

  order-service:
    build:
      context: ./order-service
      dockerfile: Dockerfile
    ports:
      - "8083:8083"
    environment:
      - JWT_SECRET=your-super-secret-key-change-in-production-env
      - SERVICE_AUTH_URL=http://auth-service:8081
      - SERVICE_CATALOG_URL=http://catalog-service:8082
      - SERVICE_PAYMENT_URL=http://payment-service:8084
      - SPRING_MONGODB_URI=mongodb+srv://eshmika:eshmika123@ctse-assignment.0krp64m.mongodb.net/?appName=CTSE-assignment
      - SPRING_MONGODB_DATABASE=orderdb
    depends_on:
      - auth-service
      - catalog-service
    networks:
      - microservices-network
    healthcheck:
      test:
        ["CMD", "wget", "-q", "-O-", "http://localhost:8083/actuator/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

  payment-service:
    build:
      context: ./payment-service
      dockerfile: Dockerfile
    ports:
      - "8084:8084"
    environment:
      - JWT_SECRET=your-super-secret-key-change-in-production-env
      - SERVICE_AUTH_URL=http://auth-service:8081
      - SERVICE_ORDER_URL=http://order-service:8083
      - SPRING_MONGODB_URI=mongodb+srv://eshmika:eshmika123@ctse-assignment.0krp64m.mongodb.net/?appName=CTSE-assignment
      - SPRING_MONGODB_DATABASE=paymentdb
    depends_on:
      - auth-service
      - order-service
    networks:
      - microservices-network
    healthcheck:
      test:
        ["CMD", "wget", "-q", "-O-", "http://localhost:8084/actuator/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

networks:
  microservices-network:
    driver: bridge
