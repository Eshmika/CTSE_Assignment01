spring.application.name=catalog-service
server.port=8082

# Server Configuration
server.servlet.context-path=/catalog
server.shutdown=graceful
server.forward-headers-strategy=framework

# MongoDB Configuration
spring.mongodb.uri=mongodb+srv://eshmika:eshmika123@ctse-assignment.0krp64m.mongodb.net/?appName=CTSE-assignment
spring.mongodb.database=${SPRING_MONGODB_DATABASE:catalogdb}
spring.mongodb.auto-index-creation=true

# Actuator Configuration (Health checks)
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized
management.health.livenessState.enabled=true
management.health.readinessState.enabled=true

# OpenAPI / Swagger Configuration
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.operations-sorter=method

# Security & JWT Configuration
app.jwt.secret=${JWT_SECRET:your-super-secret-key-change-in-production-env}

# Service URLs for inter-service communication
service.auth.url=http://auth-service:8081

# Logging
logging.level.root=INFO
logging.level.com.example=DEBUG
logging.pattern.console=%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n